      update_interval: 86400
  - rule_set:
      name: ChinaIpV6
      match: https://gh-proxy.com/https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIpV6.list
      policy: CN
      update_interval: 86400
  - rule_set:
      name: Download
      match: https://gh-proxy.com/https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
      policy: CN
      update_interval: 86400

  # ── Proxy ──
  - rule_set:
      name: OpenAi
