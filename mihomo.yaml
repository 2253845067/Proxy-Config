  - {name: SG,          type: select, include-all: true, filter: *FilterSG, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"}                                                     # 新加坡节点
  - {name: US,          type: select, include-all: true, filter: *FilterUS, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png"}                                                     # 美国节点
  - {name: OTHERS1,     type: select, include-all: true, filter: *FilterOthers, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"}                                             # 其他节点 A
