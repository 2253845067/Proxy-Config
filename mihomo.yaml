# =======================================================
# 5. 策略组 Proxy Groups
# =======================================================

# ── 地区节点匹配正则 支持国旗 / 中英文 / 地区代码 ──
FilterHK: &FilterHK '(?i).*(?:🇭🇰|香港|Hong\s?Kong|\b(?:HK|HKG)\d*\b)'
FilterTW: &FilterTW '(?i).*(?:🇹🇼|台湾|Tai(?:wan)?|\b(?:TW|TWN)\d*\b)'
FilterJP: &FilterJP '(?i).*(?:🇯🇵|日本|川日|东京|大阪|埼玉|Japan|\b(?:JP|JPN)\d*\b)'
FilterKR: &FilterKR '(?i).*(?:🇰🇷|韩国|韓|首尔|Korea|\b(?:KR|KOR)\d*\b)'
FilterSG: &FilterSG '(?i).*(?:🇸🇬|新加坡|狮|Singapore|\b(?:SG|SGP)\d*\b)'
FilterUS: &FilterUS '(?i).*(?:🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|拉斯维加斯|United States|\b(?:US|USA)\d*\b)'

# ── 全局节点净化 排除广告 / 流量信息 / 到期时间等非节点内容 ──
FilterAll: &FilterAll '(?i)^(?!.*(?:群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G)).*$'

# ── Others节点过滤 在净化的基础上，排除垃圾信息 ──
FilterOthers: &FilterOthers '(?i)^(?!.*(?:群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G)).*$'

# ── 策略组 ──
proxy-groups:

  # ── Proxy ──
  - {name: Proxy,       type: select, proxies: [Auto], include-all: true, filter: *FilterAll, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"}    
  
  # ── Auto ──
  - {name: Auto,        type: url-test, include-all: true, filter: *FilterAll, url: "https://www.gstatic.com/generate_204", interval: 300, tolerance: 50, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png"}                                             # 自动选择低延迟节点                                              # 全部节点手动选择

  # ── Regions ──
  - {name: HK,          type: select, include-all: true, filter: *FilterHK, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"}                                                     # 香港节点
